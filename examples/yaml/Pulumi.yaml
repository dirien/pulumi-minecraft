name: ${PROJECT}
runtime: yaml
description: ${DESCRIPTION}
template:
  displayName: Minecraft Server (DigitalOcean · YAML)
  description: >-
    Deploy a Java Minecraft server on a DigitalOcean droplet, written in YAML. Credentials and base config come from a Pulumi ESC environment (attach one, e.g. minecraft/demo or minecraft/prod). Any field you set below overrides the env for this stack; leave it blank to use the env value.
  config:
    region:
      description: "DigitalOcean region, e.g. fra1, nyc3, sfo3 (blank = ESC env)"
    size:
      description: "Droplet size slug, e.g. s-2vcpu-4gb (blank = ESC env)"
    motd:
      description: "Message of the day (blank = ESC env)"
    maxPlayers:
      description: "Max concurrent players (blank = ESC env)"
    difficulty:
      description: "Difficulty: peaceful, easy, normal, hard (blank = ESC env)"
    gamemode:
      description: "Game mode: survival, creative, adventure, spectator (blank = ESC env)"
    serverJarUrl:
      description: "server.jar URL (blank = auto-resolve the latest release)"
config:
  region:
    type: string
    default: fra1
  size:
    type: string
    default: s-2vcpu-4gb
  motd:
    type: string
    default: A Pulumi-powered Minecraft server
  maxPlayers:
    type: integer
    default: 20
  difficulty:
    type: string
    default: easy
  gamemode:
    type: string
    default: survival
  serverJarUrl:
    type: string
    default: ""
resources:
  mc:
    type: minecraft:index:MinecraftServer
    properties:
      region: ${region}
      size: ${size}
      motd: ${motd}
      maxPlayers: ${maxPlayers}
      difficulty: ${difficulty}
      gamemode: ${gamemode}
      serverJarUrl: ${serverJarUrl}
outputs:
  serverAddress: ${mc.serverAddress}
  ipv4Address: ${mc.ipv4Address}
  dropletId: ${mc.dropletId}
packages:
  minecraft: github.com/dirien/pulumi-minecraft@v0.1.0
