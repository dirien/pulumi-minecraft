name: ${PROJECT}
runtime: yaml
description: ${DESCRIPTION}
template:
  displayName: Minecraft Server (DigitalOcean · YAML)
  description: >-
    Deploy a Java Minecraft server on a DigitalOcean droplet, written in YAML. Configuration and DigitalOcean credentials come from a Pulumi ESC environment. Attach one (e.g. minecraft/demo or minecraft/prod) when you create the project and it sets the region, size, and every server.properties value.
config:
  region:
    type: string
    default: fra1
  size:
    type: string
    default: s-2vcpu-4gb
  motd:
    type: string
    default: A Pulumi-powered Minecraft server
  maxPlayers:
    type: integer
    default: 20
  difficulty:
    type: string
    default: easy
  gamemode:
    type: string
    default: survival
  serverJarUrl:
    type: string
    default: ""
resources:
  mc:
    type: minecraft:index:MinecraftServer
    properties:
      region: ${region}
      size: ${size}
      motd: ${motd}
      maxPlayers: ${maxPlayers}
      difficulty: ${difficulty}
      gamemode: ${gamemode}
      serverJarUrl: ${serverJarUrl}
outputs:
  serverAddress: ${mc.serverAddress}
  ipv4Address: ${mc.ipv4Address}
  dropletId: ${mc.dropletId}
packages:
  minecraft: github.com/dirien/pulumi-minecraft@v0.1.0
