name: ${PROJECT}
runtime: yaml
description: ${DESCRIPTION}
template:
  displayName: Minecraft Server (DigitalOcean · YAML)
  description: >-
    Deploy a Java Minecraft server on a DigitalOcean droplet, written in YAML. Cloud auth comes from a Pulumi ESC environment, so the only things you pick here are how the server should play.
  config:
    region:
      description: "DigitalOcean region: fra1, nyc3, sfo3, sgp1, ..."
      default: fra1
    size:
      description: "Droplet size slug (Minecraft likes RAM)"
      default: s-2vcpu-4gb
    motd:
      description: "Message of the day shown in the multiplayer server list"
      default: A Pulumi-powered Minecraft server
    maxPlayers:
      description: "Maximum concurrent players"
      default: "20"
    difficulty:
      description: "World difficulty: peaceful, easy, normal, hard"
      default: easy
    gamemode:
      description: "Default game mode: survival, creative, adventure, spectator"
      default: survival
    serverJarUrl:
      description: "server.jar URL (leave empty to auto-resolve the latest release)"
config:
  region:
    type: string
    default: fra1
  size:
    type: string
    default: s-2vcpu-4gb
  motd:
    type: string
    default: A Pulumi-powered Minecraft server
  maxPlayers:
    type: integer
    default: 20
  difficulty:
    type: string
    default: easy
  gamemode:
    type: string
    default: survival
  serverJarUrl:
    type: string
    default: ""
resources:
  mc:
    type: minecraft:index:MinecraftServer
    properties:
      region: ${region}
      size: ${size}
      motd: ${motd}
      maxPlayers: ${maxPlayers}
      difficulty: ${difficulty}
      gamemode: ${gamemode}
      serverJarUrl: ${serverJarUrl}
outputs:
  serverAddress: ${mc.serverAddress}
  ipv4Address: ${mc.ipv4Address}
  dropletId: ${mc.dropletId}
packages:
  minecraft: github.com/dirien/pulumi-minecraft@v0.1.0
