name: ${PROJECT}
runtime: go
description: ${DESCRIPTION}
template:
  displayName: Minecraft Server (DigitalOcean · Go)
  description: >-
    Deploy a Java Minecraft server on a DigitalOcean droplet, written in Go.
    Configuration and DigitalOcean credentials come from a Pulumi ESC
    environment. Attach one (e.g. minecraft/demo or minecraft/prod) when you
    create the project and it sets the region, size, and every
    server.properties value.
packages:
  minecraft: github.com/dirien/pulumi-minecraft@v0.1.0
